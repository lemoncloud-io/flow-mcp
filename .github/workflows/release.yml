name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci
      - run: npm run lint
      - run: npm run lint:type
      - run: npm test
      - run: npm run build

      - name: Get version before release
        id: pre-version
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Semantic Release
        id: release
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Get version after release
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "${{ steps.pre-version.outputs.version }}" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare Slack message
        if: success() && steps.version.outputs.released == 'true'
        id: slack-message
        run: |
          set -e
          TIMESTAMP=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S')
          COMMIT_SHA="${GITHUB_SHA:0:7}"
          echo "timestamp=$TIMESTAMP" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"

      - name: Post to Slack channel
        if: success() && steps.version.outputs.released == 'true'
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.RELEASE_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.EUREKACODES_CHANNEL }}
            text: ":npm: flow-mcp npm publish 알림"
            unfurl_links: false
            unfurl_media: false
            attachments: [
                {
                    "color": "#CB3837",
                    "blocks": [
                        {
                            "type": "section",
                            "text": {
                                "type": "mrkdwn",
                                "text": ":npm: *@lemoncloud/flow-mcp* `v${{ steps.version.outputs.version }}` npm 배포 완료\n• <https://www.npmjs.com/package/@lemoncloud/flow-mcp|npm package> | <https://github.com/${{ github.repository }}/releases|Release Notes>"
                            }
                        },
                        {
                            "type": "divider"
                        },
                        {
                            "type": "section",
                            "fields": [
                                {
                                    "type": "mrkdwn",
                                    "text": "*배포 시각:*\n${{ steps.slack-message.outputs.timestamp }}"
                                },
                                {
                                    "type": "mrkdwn",
                                    "text": "*커밋:*\n<https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${{ steps.slack-message.outputs.commit_sha }}>"
                                }
                            ]
                        },
                        {
                            "type": "context",
                            "elements": [
                                {
                                    "type": "mrkdwn",
                                    "text": "by ${{ github.actor }} | <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Actions Run>"
                                }
                            ]
                        }
                    ]
                }
            ]

      - name: Notify Slack on failure
        if: failure() && steps.release.outcome == 'failure'
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.RELEASE_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.EUREKACODES_CHANNEL }}
            text: ":x: flow-mcp 릴리스 실패"
            unfurl_links: false
            unfurl_media: false
            attachments: [
                {
                    "color": "#E01E5A",
                    "blocks": [
                        {
                            "type": "section",
                            "text": {
                                "type": "mrkdwn",
                                "text": "*@lemoncloud/flow-mcp* 릴리스 파이프라인 실패\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Actions Run 확인>"
                            }
                        },
                        {
                            "type": "context",
                            "elements": [
                                {
                                    "type": "mrkdwn",
                                    "text": "by ${{ github.actor }} | <https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                                }
                            ]
                        }
                    ]
                }
            ]
